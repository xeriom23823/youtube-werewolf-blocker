<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube 狼人殺遮蔽助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --success-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --danger-gradient: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
      --dark-bg: #0f0f23;
      --card-bg: rgba(30, 30, 60, 0.8);
      --card-border: rgba(255, 255, 255, 0.1);
      --text-primary: #ffffff;
      --text-secondary: #b4b4d4;
      --text-muted: #6b6b8f;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.5);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    body {
      width: 380px;
      min-height: 500px;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', '微軟正黑體', 'PingFang TC', 'Noto Sans TC', sans-serif;
      background: var(--dark-bg);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 90% 80%, rgba(118, 75, 162, 0.15) 0%, transparent 50%);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
    }
    
    .container {
      padding: 20px;
    }
    /* === 頭部區域 === */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
      padding: 16px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: var(--radius-lg);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--primary-gradient);
    }
    .logo {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-sm);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
      transition: var(--transition);
    }
    .logo:hover {
      transform: scale(1.05) rotate(5deg);
    }
    .title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
      letter-spacing: 0.5px;
      flex: 1;
    }
    
    /* === 狀態顯示 === */
    .status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 14px 18px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: var(--radius-md);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
    }
    .status:hover {
      border-color: rgba(102, 126, 234, 0.3);
      box-shadow: var(--shadow-md);
    }
    .status-text {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    #status-value {
      font-weight: 600;
      padding: 4px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      letter-spacing: 0.3px;
      transition: var(--transition);
    }
    #status-value.enabled {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
      box-shadow: 0 2px 8px rgba(56, 239, 125, 0.3);
    }
    #status-value.disabled {
      background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
      color: white;
      box-shadow: 0 2px 8px rgba(238, 9, 121, 0.3);
    }
    /* === 主要切換按鈕 === */
    .toggle-button {
      width: 100%;
      padding: 16px 24px;
      font-size: 15px;
      font-weight: 600;
      color: white;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: var(--transition);
      box-shadow: var(--shadow-md);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .toggle-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .toggle-button:hover::before {
      opacity: 0.1;
    }
    .toggle-button:active {
      transform: scale(0.98);
    }
    .toggle-button:not(.active) {
      background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
    }
    .toggle-button:not(.active):hover {
      box-shadow: 0 6px 20px rgba(238, 9, 121, 0.4);
    }
    .toggle-button.active {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
    }
    .toggle-button.active:hover {
      box-shadow: 0 6px 20px rgba(56, 239, 125, 0.4);
    }
    /* === 設定區域 === */
    .settings {
      margin-top: 24px;
      padding: 20px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: var(--radius-lg);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow-md);
    }
    
    /* === 模式選擇器 === */
    .mode-selector {
      margin-bottom: 20px;
    }
    .mode-label {
      display: block;
      margin-bottom: 12px;
      font-weight: 600;
      font-size: 14px;
      color: var(--text-primary);
      letter-spacing: 0.3px;
    }
    .radio-option {
      margin-bottom: 10px;
      padding: 10px 14px;
      background: rgba(102, 126, 234, 0.05);
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
      transition: var(--transition);
      cursor: pointer;
    }
    .radio-option:hover {
      background: rgba(102, 126, 234, 0.1);
      border-color: rgba(102, 126, 234, 0.3);
    }
    .radio-option input[type="radio"] {
      margin-right: 10px;
      cursor: pointer;
      accent-color: #667eea;
    }
    .radio-option label {
      cursor: pointer;
      user-select: none;
      color: var(--text-secondary);
      font-size: 13px;
    }
    /* === 頻道列表 === */
    .channel-list {
      max-height: 180px;
      overflow-y: auto;
      margin: 12px 0;
      padding: 8px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: var(--radius-md);
      border: 1px solid var(--card-border);
      scrollbar-width: thin;
      scrollbar-color: rgba(102, 126, 234, 0.5) transparent;
    }
    .channel-list::-webkit-scrollbar {
      width: 6px;
    }
    .channel-list::-webkit-scrollbar-track {
      background: transparent;
    }
    .channel-list::-webkit-scrollbar-thumb {
      background: rgba(102, 126, 234, 0.5);
      border-radius: 3px;
    }
    .channel-list::-webkit-scrollbar-thumb:hover {
      background: rgba(102, 126, 234, 0.7);
    }
    .channel-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      margin-bottom: 6px;
      background: rgba(102, 126, 234, 0.08);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(102, 126, 234, 0.15);
      transition: var(--transition);
    }
    .channel-item:hover {
      background: rgba(102, 126, 234, 0.15);
      border-color: rgba(102, 126, 234, 0.3);
      transform: translateX(4px);
    }
    .channel-item:last-child {
      margin-bottom: 0;
    }
    .channel-name {
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
    }
    /* === 輸入框和按鈕 === */
    .channel-input {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    #channel-name {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      background: rgba(0, 0, 0, 0.3);
      color: var(--text-primary);
      font-size: 13px;
      transition: var(--transition);
    }
    #channel-name:focus {
      outline: none;
      border-color: rgba(102, 126, 234, 0.5);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    #channel-name::placeholder {
      color: var(--text-muted);
    }
    #add-channel {
      padding: 12px 20px;
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: var(--transition);
      box-shadow: 0 2px 8px rgba(79, 172, 254, 0.3);
    }
    #add-channel:hover {
      box-shadow: 0 4px 16px rgba(79, 172, 254, 0.4);
      transform: translateY(-2px);
    }
    #add-channel:active {
      transform: translateY(0);
    }
    .remove-channel {
      padding: 6px 12px;
      background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 11px;
      font-weight: 600;
      transition: var(--transition);
      box-shadow: 0 2px 6px rgba(250, 112, 154, 0.3);
    }
    .remove-channel:hover {
      box-shadow: 0 4px 12px rgba(250, 112, 154, 0.5);
      transform: scale(1.05);
    }
    /* === 信息和版本 === */
    .info {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 24px;
      text-align: center;
      padding: 12px;
      background: rgba(102, 126, 234, 0.05);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(102, 126, 234, 0.1);
    }
    .version {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
      text-align: right;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    
    /* === 版面設定入口按鈕 === */
    .open-layout-button {
      width: 100%;
      background: var(--primary-gradient);
      color: white;
      border: none;
      padding: 13px 20px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition);
      box-shadow: 0 4px 16px rgba(102, 126, 234, 0.35);
      letter-spacing: 0.3px;
    }
    .open-layout-button:hover:not(:disabled) {
      box-shadow: 0 6px 24px rgba(102, 126, 234, 0.55);
      transform: translateY(-2px);
    }
    .open-layout-button:active:not(:disabled) {
      transform: translateY(0);
    }
    .open-layout-button:disabled {
      background: linear-gradient(135deg, #555 0%, #666 100%);
      cursor: not-allowed;
      opacity: 0.6;
    }
    /* === 片段設定區塊 === */
    .segment-settings {
      margin-top: 20px;
      padding: 18px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: var(--radius-lg);
      border: 1px solid var(--card-border);
      box-shadow: var(--shadow-md);
      transition: var(--transition);
    }
    .segment-settings:hover {
      border-color: rgba(102, 126, 234, 0.2);
    }
    .segment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      padding: 12px 14px;
      margin: -8px -8px 16px -8px;
      border-radius: var(--radius-md);
      transition: var(--transition);
      user-select: none;
    }
    .segment-header:hover {
      background: rgba(102, 126, 234, 0.1);
    }
    .segment-header:active {
      transform: scale(0.98);
    }
    .segment-title {
      font-weight: 600;
      font-size: 15px;
      color: var(--text-primary);
      letter-spacing: 0.3px;
    }
    .segment-toggle-icon {
      font-size: 14px;
      color: var(--text-secondary);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .segment-toggle-icon.expanded {
      transform: rotate(180deg);
    }
    .segment-content {
      display: none;
      animation: slideDown 0.3s ease-out;
    }
    .segment-content.show {
      display: block;
    }
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .layout-group {
      margin-bottom: 20px;
      padding: 16px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: var(--radius-md);
      border: 1px solid rgba(102, 126, 234, 0.1);
    }
    .layout-group-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid rgba(102, 126, 234, 0.2);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .slider-item {
      margin-bottom: 16px;
    }
    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .analyze-button {
      width: 100%;
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: var(--transition);
      box-shadow: 0 4px 16px rgba(79, 172, 254, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .analyze-button:hover:not(:disabled) {
      box-shadow: 0 6px 24px rgba(79, 172, 254, 0.5);
      transform: translateY(-2px);
    }
    .analyze-button:disabled {
      background: linear-gradient(135deg, #555 0%, #666 100%);
      cursor: not-allowed;
      opacity: 0.6;
    }
    .analyze-button.analyzing {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      animation: analyzing 1.5s ease-in-out infinite;
    }
    @keyframes analyzing {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    .analyze-status {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 16px;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: var(--radius-md);
      text-align: center;
      line-height: 1.6;
      border-left: 3px solid rgba(102, 126, 234, 0.3);
      transition: var(--transition);
    }
    .analyze-status.success {
      color: #38ef7d;
      background: linear-gradient(135deg, rgba(17, 153, 142, 0.15) 0%, rgba(56, 239, 125, 0.15) 100%);
      border-left-color: #38ef7d;
      box-shadow: 0 2px 8px rgba(56, 239, 125, 0.2);
    }
    .analyze-status.error {
      color: #ff6a00;
      background: linear-gradient(135deg, rgba(238, 9, 121, 0.15) 0%, rgba(255, 106, 0, 0.15) 100%);
      border-left-color: #ff6a00;
      box-shadow: 0 2px 8px rgba(255, 106, 0, 0.2);
    }
    .analyze-status.warning {
      color: #fee140;
      background: linear-gradient(135deg, rgba(250, 112, 154, 0.15) 0%, rgba(254, 225, 64, 0.15) 100%);
      border-left-color: #fee140;
      box-shadow: 0 2px 8px rgba(254, 225, 64, 0.2);
    }
    .analyze-status.info {
      color: #4facfe;
      background: linear-gradient(135deg, rgba(79, 172, 254, 0.15) 0%, rgba(0, 242, 254, 0.15) 100%);
      border-left-color: #4facfe;
      box-shadow: 0 2px 8px rgba(79, 172, 254, 0.2);
    }
    .confidence-indicator {
      display: inline-block;
      width: 70px;
      height: 8px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      margin-left: 8px;
      vertical-align: middle;
      overflow: hidden;
    }
    .confidence-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .confidence-high { background: linear-gradient(90deg, #11998e 0%, #38ef7d 100%); }
    .confidence-medium { background: linear-gradient(90deg, #f093fb 0%, #f5576c 100%); }
    .confidence-low { background: linear-gradient(90deg, #ee0979 0%, #ff6a00 100%); }
    .skip-toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(102, 126, 234, 0.1);
      transition: var(--transition);
      border-radius: var(--radius-sm);
    }
    .skip-toggle-container:hover {
      background: rgba(102, 126, 234, 0.05);
    }
    .skip-toggle-container:last-child {
      border-bottom: none;
    }
    .skip-toggle-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .skip-toggle-icon {
      font-size: 16px;
    }
    .skip-toggle {
      position: relative;
      width: 48px;
      height: 26px;
    }
    .skip-toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .skip-toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.1);
      transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 26px;
      border: 2px solid rgba(255, 255, 255, 0.1);
    }
    .skip-toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 2px;
      background: white;
      transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }
    .skip-toggle input:checked + .skip-toggle-slider {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      border-color: transparent;
    }
    .skip-toggle input:checked + .skip-toggle-slider:before {
      transform: translateX(22px);
    }
    .skip-toggle:hover .skip-toggle-slider {
      box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
    }
    .segment-list {
      margin-top: 12px;
      max-height: 160px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.3);
      border-radius: var(--radius-md);
      padding: 8px;
      border: 1px solid rgba(102, 126, 234, 0.1);
      scrollbar-width: thin;
      scrollbar-color: rgba(102, 126, 234, 0.5) transparent;
    }
    .segment-list::-webkit-scrollbar {
      width: 6px;
    }
    .segment-list::-webkit-scrollbar-track {
      background: transparent;
    }
    .segment-list::-webkit-scrollbar-thumb {
      background: rgba(102, 126, 234, 0.5);
      border-radius: 3px;
    }
    .segment-list::-webkit-scrollbar-thumb:hover {
      background: rgba(102, 126, 234, 0.7);
    }
    .segment-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      font-size: 12px;
      margin-bottom: 6px;
      background: rgba(102, 126, 234, 0.08);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(102, 126, 234, 0.15);
      transition: var(--transition);
    }
    .segment-item:hover {
      background: rgba(102, 126, 234, 0.15);
      transform: translateX(4px);
    }
    .segment-item:last-child {
      margin-bottom: 0;
    }
    .segment-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .segment-type {
      color: #4facfe;
      font-weight: 600;
      font-size: 13px;
    }
    .segment-time {
      color: var(--text-muted);
      font-size: 11px;
    }
    .segment-buttons {
      display: flex;
      gap: 6px;
    }
    .segment-jump {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 2px 6px rgba(79, 172, 254, 0.3);
    }
    .segment-jump:hover {
      box-shadow: 0 4px 12px rgba(79, 172, 254, 0.5);
      transform: scale(1.05);
    }
    .segment-delete {
      background: transparent;
      color: #ff6a00;
      border: 1px solid #ff6a00;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      line-height: 1;
      transition: var(--transition);
    }
    .segment-delete:hover {
      background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
      color: white;
      border-color: transparent;
      box-shadow: 0 2px 8px rgba(238, 9, 121, 0.4);
    }
    .master-skip-toggle {
      margin-bottom: 18px;
      padding: 14px 16px;
      background: linear-gradient(135deg, rgba(79, 172, 254, 0.1) 0%, rgba(0, 242, 254, 0.1) 100%);
      border-radius: var(--radius-md);
      border: 1px solid rgba(79, 172, 254, 0.3);
      box-shadow: 0 2px 8px rgba(79, 172, 254, 0.1);
    }
    .clear-segments-button {
      width: 100%;
      background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: var(--radius-md);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      transition: var(--transition);
      box-shadow: 0 2px 8px rgba(238, 9, 121, 0.3);
    }
    .clear-segments-button:hover {
      box-shadow: 0 4px 16px rgba(238, 9, 121, 0.5);
      transform: translateY(-2px);
    }
    /* === 手動新增片段 === */
    .manual-segment-form {
      margin-top: 12px;
    }
    .time-input-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .time-input-group {
      flex: 1;
      position: relative;
    }
    .time-input-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .time-input {
      width: calc(100% - 40px);
      padding: 10px 12px;
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm) 0 0 var(--radius-sm);
      background: rgba(0, 0, 0, 0.3);
      color: var(--text-primary);
      font-size: 14px;
      text-align: center;
      box-sizing: border-box;
      transition: var(--transition);
    }
    .time-input:focus {
      outline: none;
      border-color: rgba(102, 126, 234, 0.5);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .use-current-btn {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 40px;
      height: 40px;
      border: 1px solid var(--card-border);
      border-left: none;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      background: rgba(102, 126, 234, 0.2);
      color: white;
      cursor: pointer;
      font-size: 16px;
      transition: var(--transition);
    }
    .use-current-btn:hover {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      box-shadow: 0 2px 8px rgba(56, 239, 125, 0.4);
    }
    .time-separator {
      color: var(--text-muted);
      font-size: 20px;
      margin-top: 22px;
      font-weight: 600;
    }
    .segment-type-row, .keyword-type-row {
      margin-bottom: 12px;
    }
    .segment-type-row label, .keyword-type-row label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .segment-type-select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      background: rgba(0, 0, 0, 0.3);
      color: var(--text-primary);
      font-size: 13px;
      cursor: pointer;
      transition: var(--transition);
    }
    .segment-type-select:focus {
      outline: none;
      border-color: rgba(102, 126, 234, 0.5);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .add-segment-button {
      width: 100%;
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 4px 12px rgba(56, 239, 125, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .add-segment-button:hover {
      box-shadow: 0 6px 20px rgba(56, 239, 125, 0.5);
      transform: translateY(-2px);
    }
    .manual-segment-hint, .custom-keywords-hint {
      margin-top: 10px;
      font-size: 11px;
      color: var(--text-muted);
      line-height: 1.6;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: var(--radius-sm);
      border-left: 2px solid rgba(102, 126, 234, 0.3);
    }
    /* === 自訂關鍵詞 === */
    .custom-keywords-section {
      margin-top: 10px;
    }
    .keyword-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .keyword-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      background: rgba(0, 0, 0, 0.3);
      color: var(--text-primary);
      font-size: 13px;
      transition: var(--transition);
    }
    .keyword-input:focus {
      outline: none;
      border-color: rgba(102, 126, 234, 0.5);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .keyword-input::placeholder {
      color: var(--text-muted);
    }
    .add-keyword-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: 0 2px 8px rgba(56, 239, 125, 0.3);
    }
    .add-keyword-btn:hover {
      box-shadow: 0 4px 16px rgba(56, 239, 125, 0.5);
      transform: scale(1.05);
    }
    .custom-keywords-list {
      max-height: 140px;
      overflow-y: auto;
      background: rgba(0, 0, 0, 0.3);
      border-radius: var(--radius-md);
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid rgba(102, 126, 234, 0.1);
      scrollbar-width: thin;
      scrollbar-color: rgba(102, 126, 234, 0.5) transparent;
    }
    .custom-keywords-list::-webkit-scrollbar {
      width: 6px;
    }
    .custom-keywords-list::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-keywords-list::-webkit-scrollbar-thumb {
      background: rgba(102, 126, 234, 0.5);
      border-radius: 3px;
    }
    .custom-keywords-list::-webkit-scrollbar-thumb:hover {
      background: rgba(102, 126, 234, 0.7);
    }
    .keyword-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      font-size: 12px;
      margin-bottom: 6px;
      background: rgba(102, 126, 234, 0.08);
      border-radius: var(--radius-sm);
      border: 1px solid rgba(102, 126, 234, 0.15);
      transition: var(--transition);
    }
    .keyword-item:hover {
      background: rgba(102, 126, 234, 0.15);
      transform: translateX(4px);
    }
    .keyword-item:last-child {
      margin-bottom: 0;
    }
    .keyword-item-type {
      color: #4facfe;
      font-size: 10px;
      font-weight: 600;
      margin-right: 10px;
      padding: 2px 8px;
      background: rgba(79, 172, 254, 0.2);
      border-radius: 6px;
    }
    .keyword-item-text {
      flex: 1;
      color: var(--text-primary);
    }
    .keyword-remove-btn {
      background: transparent;
      border: none;
      color: #ff6a00;
      cursor: pointer;
      font-size: 16px;
      padding: 4px 8px;
      transition: var(--transition);
      border-radius: 6px;
    }
    .keyword-remove-btn:hover {
      color: white;
      background: linear-gradient(135deg, #ee0979 0%, #ff6a00 100%);
    }
    .no-keywords-hint {
      color: var(--text-muted);
      font-size: 12px;
      text-align: center;
      padding: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
  <div class="header">
    <img src="icons/icon48.png" alt="Logo" class="logo">
    <h1 class="title">YouTube 狼人殺遮蔽助手</h1>
  </div>
  
  <div class="status">
    <span class="status-text">目前狀態:</span>
    <span id="status-value" class="disabled">已停用</span>
  </div>
  
  <button id="toggle" class="toggle-button">開啟遮蔽</button>
  
  <div class="settings">
    <div class="mode-selector">
      <span class="mode-label">遮蔽模式:</span>
      <div class="radio-option">
        <input type="radio" id="mode-all" name="block-mode" value="all">
        <label for="mode-all">套用於所有頻道</label>
      </div>
      <div class="radio-option">
        <input type="radio" id="mode-selected" name="block-mode" value="selected">
        <label for="mode-selected">僅套用於選定頻道</label>
      </div>
    </div>
    
    <div id="channel-section">
      <div>已選擇的頻道：</div>
      <div class="channel-list" id="channel-list">
        <!-- 動態填入頻道列表 -->
      </div>
      <div class="channel-input">
        <input type="text" id="channel-name" placeholder="輸入頻道名稱 (例如: @頻道名稱)">
        <button id="add-channel">新增</button>
      </div>
    </div>
  </div>
  
  <!-- 版面設定入口 -->
  <button id="open-layout-panel" class="open-layout-button">📐 開啟版面設定</button>

  <!-- 片段設定區塊 -->
  <div class="segment-settings">
    <div class="segment-header" id="segment-header">
      <span class="segment-title">🎬 片段跳過設定</span>
      <span class="segment-toggle-icon" id="segment-toggle-icon">▼</span>
    </div>
    <div class="segment-content" id="segment-content">
      <!-- 分析按鈕 -->
      <button id="analyze-video" class="analyze-button">
        <span>🔍</span>
        <span id="analyze-button-text">字幕規則分析</span>
      </button>
      
      <!-- 分析狀態 -->
      <div class="analyze-status" id="analyze-status">
        尚未分析此影片
      </div>
      
      <!-- 跳過功能總開關 -->
      <div class="master-skip-toggle">
        <div class="skip-toggle-container">
          <div class="skip-toggle-label">
            <span class="skip-toggle-icon">⏭️</span>
            <span>啟用自動跳過</span>
          </div>
          <label class="skip-toggle">
            <input type="checkbox" id="skip-enabled" checked>
            <span class="skip-toggle-slider"></span>
          </label>
        </div>
      </div>
      
      <!-- 各階段跳過開關 -->
      <div class="layout-group">
        <div class="layout-group-title">選擇要跳過的環節</div>
        
        <div class="skip-toggle-container">
          <div class="skip-toggle-label">
            <span class="skip-toggle-icon">🌙</span>
            <span>夜間環節</span>
          </div>
          <label class="skip-toggle">
            <input type="checkbox" id="skip-night" checked>
            <span class="skip-toggle-slider"></span>
          </label>
        </div>
        
        <div class="skip-toggle-container">
          <div class="skip-toggle-label">
            <span class="skip-toggle-icon">🎴</span>
            <span>抽牌環節</span>
          </div>
          <label class="skip-toggle">
            <input type="checkbox" id="skip-draw" checked>
            <span class="skip-toggle-slider"></span>
          </label>
        </div>
        
        <div class="skip-toggle-container">
          <div class="skip-toggle-label">
            <span class="skip-toggle-icon">🎤</span>
            <span>開場環節</span>
          </div>
          <label class="skip-toggle">
            <input type="checkbox" id="skip-opening">
            <span class="skip-toggle-slider"></span>
          </label>
        </div>
        
        <div class="skip-toggle-container">
          <div class="skip-toggle-label">
            <span class="skip-toggle-icon">📋</span>
            <span>復盤環節</span>
          </div>
          <label class="skip-toggle">
            <input type="checkbox" id="skip-review">
            <span class="skip-toggle-slider"></span>
          </label>
        </div>
      </div>
      
      <!-- 偵測到的片段列表 -->
      <div class="layout-group">
        <div class="layout-group-title">偵測到的片段 (<span id="segment-count">0</span>)</div>
        <div class="segment-list" id="segment-list">
          <div class="segment-item" style="color: #777; justify-content: center;">
            尚無片段資料
          </div>
        </div>
        <button id="clear-segments" class="clear-segments-button">🗑️ 清除此影片的片段資料</button>
      </div>
      
      <!-- 手動新增片段 -->
      <div class="layout-group">
        <div class="layout-group-title">✏️ 手動新增片段</div>
        <div class="manual-segment-form">
          <div class="time-input-row">
            <div class="time-input-group">
              <label>開始時間</label>
              <input type="text" id="manual-start-time" placeholder="0:00" class="time-input">
              <button id="use-current-start" class="use-current-btn" title="使用影片當前時間">📍</button>
            </div>
            <span class="time-separator">→</span>
            <div class="time-input-group">
              <label>結束時間</label>
              <input type="text" id="manual-end-time" placeholder="0:00" class="time-input">
              <button id="use-current-end" class="use-current-btn" title="使用影片當前時間">📍</button>
            </div>
          </div>
          <div class="segment-type-row">
            <label>類型</label>
            <select id="manual-segment-type" class="segment-type-select">
              <option value="night">🌙 夜間環節</option>
              <option value="draw">🎴 抽牌環節</option>
              <option value="opening">🎤 開場環節</option>
              <option value="review">📋 復盤環節</option>
              <option value="custom">⏭️ 自訂跳過</option>
            </select>
          </div>
          <button id="add-manual-segment" class="add-segment-button">➕ 新增片段</button>
          <div class="manual-segment-hint">
            提示：時間格式為 分:秒 或 時:分:秒<br>
            點擊 📍 可使用影片當前播放時間
          </div>
        </div>
      </div>
      
      <!-- 自訂關鍵詞 -->
      <div class="layout-group">
        <div class="layout-group-title">🔤 自訂偵測關鍵詞</div>
        <div class="custom-keywords-section">
          <div class="keyword-type-row">
            <label>環節類型</label>
            <select id="keyword-segment-type" class="segment-type-select">
              <option value="night-start">🌙 夜間開始</option>
              <option value="night-end">🌙 夜間結束</option>
              <option value="review-start">📋 復盤開始</option>
              <option value="draw">🎴 抽牌環節</option>
              <option value="opening">🎤 開場環節</option>
            </select>
          </div>
          <div class="keyword-input-row">
            <input type="text" id="custom-keyword-input" placeholder="輸入關鍵詞，如「進入黑夜」" class="keyword-input">
            <button id="add-keyword-btn" class="add-keyword-btn" title="新增關鍵詞">+</button>
          </div>
          <div class="custom-keywords-list" id="custom-keywords-list">
            <div class="no-keywords-hint">尚未新增自訂關鍵詞</div>
          </div>
          <div class="custom-keywords-hint">
            提示：新增的關鍵詞會與內建關鍵詞一起用於字幕分析<br>
            適合針對特定頻道的用語進行優化
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <div class="info">
    此遮蔽功能僅在 YouTube 上使用時有效
  </div>
  
  <div class="version">版本 1.6</div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
</html>
